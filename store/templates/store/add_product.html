<!DOCTYPE html>
<html>
<head>
    <title>Add Product - {{ store.name }}</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        form { background: #f9f9f9; padding: 20px; border: 1px solid #ddd; max-width: 400px; }
        input, textarea { width: 100%; margin-bottom: 15px; padding: 8px; }
        button { background: #28a745; color: white; padding: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Add New Product to {{ store.name }}</h1>
    <p>Fill in the details below to add an item to your inventory.</p>

    <form method="POST">
        {% csrf_token %}
        
        <label>Product Name:</label>
        <input type="text" name="name" placeholder="e.g. Blue T-Shirt" required>

        <label>Description:</label>
        <textarea name="description" rows="4" placeholder="Describe your product..." required></textarea>

        <label>Price ($):</label>
        <input type="number" step="0.01" name="price" placeholder="0.00" required>

        <label>Stock Quantity:</label>
        <input type="number" name="stock" placeholder="0" required>

        <button type="submit">Save Product</button>
    </form>

    <br>
    <a href="{% url 'manage_products' store.id %}">← Cancel and Go Back</a>

</body>
</html>
