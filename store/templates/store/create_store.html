<h2>Create a New Store</h2>
<form method="POST">
    {% csrf_token %}
    <p>Store Name: <input type="text" name="name" required></p>
    <p>Description: <textarea name="description"></textarea></p>
    <button type="submit">Create Store</button>
</form>
<a href="{% url 'vendor_store_list' %}">Cancel</a>
