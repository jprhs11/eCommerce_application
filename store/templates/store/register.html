html
<h2>Create an Account</h2>

<!-- This block shows why the registration failed -->
{% if form.errors %}
    <div style="color: red;">
        <strong>Please fix the following:</strong>
        {{ form.errors }}
    </div>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
</form>
